name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # The load-bearing gate for this PUBLIC repo (DEC-0012): fail the build if any
  # tracked file carries a secret or personal identifier. Kept as its OWN job so
  # it runs independently of lint — a lint failure must never silently skip the
  # secret scan (mark this job as the required status check in branch protection).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # PROVE THE GATE FIRST. A green secret scan is not evidence the gate works —
      # for nine sessions it was green precisely because it caught nothing (DEC-0039).
      # This plants known-bad payloads that MUST be caught and known-good lines that
      # MUST pass, so a regression in the allow-list fails CI instead of going quiet.
      - name: Prove the gate (planted payloads)
        run: |
          chmod +x scripts/check_secrets.sh scripts/test_check_secrets.sh
          scripts/test_check_secrets.sh

      - name: Secret scan (all tracked files)
        run: |
          chmod +x scripts/check_secrets.sh
          git ls-files | xargs scripts/check_secrets.sh

  # The driver's unit tests (rain wraparound, SensorQC, dewpoint nulls, reception
  # maths). These existed for six sessions and CI never ran them.
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install tools
        # ruff pinned to match .pre-commit-config.yaml (DEC-0027) — an unpinned
        # install drifted to 0.16.0 and its new default rules flagged 295
        # pre-existing hits (139 in the No-Rewrite-protected rtldavis.py),
        # tripping the required `lint` check for every PR (S46).
        run: python -m pip install --upgrade pip "ruff==0.5.7" mypy

      - name: Ruff lint
        run: python -m ruff check .

      # Note: no `ruff format --check` gate. The codebase uses deliberate column
      # alignment for readability, and the driver (rtldavis.py) is baked into the
      # shipped image — auto-reformatting it would churn a prod-sacred file. We
      # enforce lint (real bug classes) but not the formatter's style. See ruff.toml
      # + DEC-0027 (S31). Vendored third-party uploaders are excluded via ruff.toml.

      - name: Mypy
        run: python -m mypy --ignore-missing-imports --no-strict-optional . || true
