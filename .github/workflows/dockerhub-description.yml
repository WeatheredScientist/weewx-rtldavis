name: Sync Docker Hub description

# Keeps the Docker Hub overview page in step with README.md — most users land on
# Docker Hub, and its description is a SEPARATE copy that otherwise drifts stale
# on every release (it has no automatic link to this repo).
#
# Runs when README.md changes on main (i.e. at release time) or on demand.
#
# REQUIRES two repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  — the Docker Hub account (weatheredscientist)
#   DOCKERHUB_TOKEN     — a Docker Hub access token with Read/Write on the repo
#                         (Docker Hub → Account Settings → Personal access tokens)
# Until both are set, the job is a harmless no-op (stays green, does nothing).

on:
  push:
    branches: [main]
    paths: ["README.md"]
  workflow_dispatch:

jobs:
  dockerhub-description:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Docker Hub credentials
        id: creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set — skipping Docker Hub description sync."
          fi

      - name: Check out repository
        if: steps.creds.outputs.present == 'true'
        uses: actions/checkout@v4

      - name: Push README to Docker Hub
        if: steps.creds.outputs.present == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: weatheredscientist/weewx-rtldavis
          short-description: "weewx + RTL-SDR for Davis ISS. No console needed. Posts to WU, WOW, CWOP, PWSweather."
          enable-url-completion: true
